# AWS TARGET architecture — local stand-in.
#
# This is the world we migrate *to*. The source system we migrate *from* is a complete,
# runnable on-prem stack under `legacy/` (`cd legacy && docker compose up`). The split is
# deliberate — see ADR-0005.
#
# Service names mirror their AWS primitive so the mapping is obvious to every reader:
#   postgres-rds       -> Amazon RDS (Postgres)   [the one datastore actually migrated]
#   redis-elasticache  -> Amazon ElastiCache       [a target ADDITION — legacy has no cache]
#   minio-s3           -> Amazon S3                [a target ADDITION — legacy has no object store]
#
# Redis and MinIO are here as deliberate target choices to be justified in The Options, NOT
# as components lifted from legacy (ADR-0005). Secrets come from a git-ignored .env; in the
# cloud these become AWS Secrets Manager / SSM references (ADR-0003).

services:
  # --- Migrated application containers -------------------------------------------------
  # The customer-facing web app -> ECS / App Runner behind an ALB. It is NOT containerised
  # for the target yet (that is Challenge 4, "The Container"). Until then this is a documented
  # placeholder rather than a build pointing at a path that does not exist. When built, the
  # same image must deploy to the target with a config swap, not a rebuild.
  #
  # web-app:
  #   build:
  #     context: ./web-app          # produced by Challenge 4; see legacy/web-app for the source
  #   image: contoso/web-app:local
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     DATABASE_URL: postgres://contoso:${POSTGRES_PASSWORD}@postgres-rds:5432/contoso
  #     REDIS_URL: redis://redis-elasticache:6379
  #     S3_ENDPOINT: http://minio-s3:9000
  #     S3_BUCKET: contoso-web-assets
  #   depends_on: [postgres-rds, redis-elasticache, minio-s3]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
  #     interval: 15s
  #     timeout: 3s
  #     retries: 5

  # --- Target datastores (runnable today) ----------------------------------------------
  postgres-rds:
    # Stands in for Amazon RDS (Postgres). The migrated counterpart of legacy's postgres.
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contoso
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: contoso
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis-elasticache:
    # Stands in for Amazon ElastiCache (Redis). Target addition — not present in legacy.
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio-s3:
    # Stands in for Amazon S3. Target addition — not present in legacy.
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
