# AWS TARGET architecture — local stand-in.
#
# This is the world we migrate *to*. The source system we migrate *from* is a complete,
# runnable on-prem stack under `legacy/` (`cd legacy && docker compose up`). The split is
# deliberate — see ADR-0005.
#
# Service names mirror their AWS primitive so the mapping is obvious to every reader:
#   postgres-rds       -> Amazon RDS (Postgres)   [the one datastore actually migrated]
#   redis-elasticache  -> Amazon ElastiCache       [a target ADDITION — legacy has no cache]
#   minio-s3           -> Amazon S3                [a target ADDITION — legacy has no object store]
#
# Redis and MinIO are here as deliberate target choices to be justified in The Options, NOT
# as components lifted from legacy (ADR-0005). Secrets come from a git-ignored .env; in the
# cloud these become AWS Secrets Manager / SSM references (ADR-0003).

services:
  # --- Migrated application containers (Challenge 4 + 5) -------------------------------
  web-api:
    # Spring Boot API — stands in for ECS Fargate task behind ALB.
    # Cloud: ECR image → ECS Fargate service, secrets via Secrets Manager.
    build:
      context: ./legacy/web-app/api
    image: contoso/legacy-web-api:local
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-rds:5432/contoso
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD}
    depends_on:
      postgres-rds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

  web-frontend:
    # Vue SPA served by nginx — LOCAL ONLY.
    # Cloud: dist/ uploaded to S3 contoso-web-frontend-s3, served via CloudFront.
    # The nginx /api/ reverse-proxy here stands in for CloudFront /api/* → ALB (coupling C1).
    build:
      context: ./legacy/web-app/frontend
    image: contoso/legacy-web-frontend:local
    ports:
      - "8080:80"
    depends_on:
      web-api:
        condition: service_healthy

  # --- Target datastores (runnable today) ----------------------------------------------
  postgres-rds:
    # Stands in for Amazon RDS (Postgres). The migrated counterpart of legacy's postgres.
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contoso
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: contoso
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "contoso", "-d", "contoso"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-elasticache:
    # Stands in for Amazon ElastiCache (Redis). Target addition — not present in legacy.
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio-s3:
    # Stands in for Amazon S3. Target addition — not present in legacy.
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
