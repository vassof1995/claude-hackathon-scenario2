spring:
  application:
    name: contoso-legacy-batch
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contoso}
    username: ${SPRING_DATASOURCE_USERNAME:batch_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me-batch}
  flyway:
    schemas: reporting
    default-schema: reporting

server:
  port: 8080

# Nightly reconciliation schedule (Spring 6-field cron). Override via RECON_CRON.
recon:
  cron: ${RECON_CRON:0 0 2 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
