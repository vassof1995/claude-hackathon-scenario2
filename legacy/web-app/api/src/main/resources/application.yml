spring:
  application:
    name: contoso-legacy-web-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contoso}
    username: ${SPRING_DATASOURCE_USERNAME:app_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me-app}
  jpa:
    hibernate:
      ddl-auto: validate        # schema is owned by Flyway, never auto-generated
    open-in-view: false
    properties:
      hibernate:
        default_schema: app
  flyway:
    schemas: app
    default-schema: app

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
